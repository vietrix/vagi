name: codex-autofix

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  codex-autofix:
    if: github.event.label.name == 'ai-autofix'
    runs-on: ubuntu-latest
    steps:
      - name: Gate autofix trigger
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const pr = context.payload.pull_request;
            const sameRepo = pr.head.repo.full_name === pr.base.repo.full_name;
            const allowed = !pr.draft && sameRepo;
            core.setOutput('run_autofix', allowed ? 'true' : 'false');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_repo', pr.head.repo.full_name);

      - name: Check API key
        id: keycheck
        if: steps.gate.outputs.run_autofix == 'true'
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Checkout PR
        if: steps.gate.outputs.run_autofix == 'true' && steps.keycheck.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.gate.outputs.head_repo }}
          ref: ${{ steps.gate.outputs.head_sha }}
          fetch-depth: 0

      - name: Fetch base ref
        if: steps.gate.outputs.run_autofix == 'true' && steps.keycheck.outputs.available == 'true'
        run: git fetch origin "${BASE_REF}" --depth=1
        env:
          BASE_REF: ${{ steps.gate.outputs.base_ref }}

      - name: Run tests
        id: tests
        if: steps.gate.outputs.run_autofix == 'true' && steps.keycheck.outputs.available == 'true'
        run: |
          set +e
          pytest > test_output.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Truncate test logs
        if: steps.tests.outputs.failed == 'true' && steps.keycheck.outputs.available == 'true'
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path("test_output.log").read_text(encoding="utf-8")
          Path("test_output_trunc.log").write_text(text[:4000], encoding="utf-8")
          PY

      - name: Build Codex autofix input
        if: steps.tests.outputs.failed == 'true' && steps.keycheck.outputs.available == 'true'
        run: |
          python - <<'PY'
          import subprocess
          import os
          from pathlib import Path

          base_ref = os.environ["BASE_REF"]
          diff_range = f"origin/{base_ref}...HEAD"
          diff = subprocess.check_output(["git", "diff", "--unified=3", diff_range], text=True)
          changed = subprocess.check_output(["git", "diff", "--name-only", diff_range], text=True)
          log = Path("test_output_trunc.log").read_text(encoding="utf-8")

          instructions = [
            "# Autofix instructions",
            "- Fix failing tests with minimal changes.",
            "- Do not refactor unrelated code.",
            "- Update tests/docs only if required by the fix.",
            "",
            "# Changed files",
            changed.strip(),
            "",
            "# Failing test output (truncated)",
            "```",
            log.strip(),
            "```",
            "",
            "# Diff",
            "```diff",
            diff.strip(),
            "```",
          ]
          Path("codex_autofix.md").write_text("\n".join(instructions), encoding="utf-8")
          PY
        env:
          BASE_REF: ${{ steps.gate.outputs.base_ref }}

      - name: Run Codex autofix
        if: steps.tests.outputs.failed == 'true' && steps.keycheck.outputs.available == 'true'
        uses: openai/codex-action@v1
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          command: codex exec --input codex_autofix.md --output codex_autofix.out --format markdown

      - name: Re-run tests
        id: tests_after
        if: steps.tests.outputs.failed == 'true' && steps.keycheck.outputs.available == 'true'
        run: |
          set +e
          pytest > test_output_after.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Create autofix PR
        if: steps.tests_after.outputs.failed == 'false' && steps.keycheck.outputs.available == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const prNumber = Number('${{ steps.gate.outputs.pr_number }}');
            const baseRef = '${{ steps.gate.outputs.head_ref }}';
            const branchName = `codex/autofix/pr-${prNumber}`;
            const { execSync } = require('child_process');

            execSync(`git checkout -b ${branchName}`);
            execSync('git config user.name "codex-autofix"');
            execSync('git config user.email "codex-autofix@users.noreply.github.com"');
            const status = execSync('git status --porcelain').toString().trim();
            if (!status) {
              throw new Error('No changes to commit after autofix.');
            }
            execSync('git add -A');
            execSync('git commit -m "codex: autofix failing tests"');
            execSync(`git push origin ${branchName}`);

            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branchName}`,
              base: baseRef,
            });
            if (existing.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: branchName,
                base: baseRef,
                title: `codex autofix for PR #${prNumber}`,
                body: 'Automated fix for failing tests via Codex.',
              });
            }

      - name: Comment on failure
        if: steps.tests_after.outputs.failed == 'true' && steps.keycheck.outputs.available == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.gate.outputs.pr_number }}');
            const body = [
              'Codex autofix attempted but tests are still failing.',
              'Next steps: review `test_output_after.log` in the workflow logs and fix manually.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
