name: perf-regression

on:
  workflow_dispatch:
    inputs:
      threshold_ms:
        description: "Max allowed avg step latency (ms)"
        required: false
        default: "500.0"

permissions:
  contents: read

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e .
      - name: Latency gate
        run: python -m scripts.perf_regression_gate --threshold-ms ${{ inputs.threshold_ms }}
