<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ec4b6"/>
      <stop offset="100%" style="stop-color:#20a4f3"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9f1c"/>
      <stop offset="100%" style="stop-color:#e76f51"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#560bad"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="bold" fill="#fff">vAGI Architecture</text>
  <text x="400" y="55" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#888">Artificial General Intelligence System</text>

  <!-- Input Layer -->
  <g transform="translate(50, 80)">
    <rect width="120" height="40" rx="6" fill="url(#green)" opacity="0.9"/>
    <text x="60" y="25" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#fff">Input Text</text>
  </g>

  <path d="M170 100 L210 100" stroke="#4cc9f0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#4cc9f0"/></marker></defs>

  <g transform="translate(220, 80)">
    <rect width="120" height="40" rx="6" fill="url(#green)" opacity="0.9"/>
    <text x="60" y="18" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">BPE Tokenizer</text>
    <text x="60" y="32" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#ccc">Vietnamese + EN</text>
  </g>

  <path d="M340 100 L380 100" stroke="#4cc9f0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(390, 80)">
    <rect width="120" height="40" rx="6" fill="url(#green)" opacity="0.9"/>
    <text x="60" y="18" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Embedding</text>
    <text x="60" y="32" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#ccc">+ RoPE Position</text>
  </g>

  <path d="M510 100 L550 100" stroke="#4cc9f0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(560, 80)">
    <rect width="120" height="40" rx="6" fill="url(#purple)" opacity="0.9"/>
    <text x="60" y="18" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Memory</text>
    <text x="60" y="32" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#ccc">KV Cache</text>
  </g>

  <!-- Transformer Block -->
  <g transform="translate(80, 150)">
    <rect width="640" height="140" rx="10" fill="url(#blue)" opacity="0.95"/>
    <text x="320" y="25" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#fff">Transformer Backbone (N Layers)</text>

    <!-- Attention -->
    <g transform="translate(30, 40)">
      <rect width="160" height="80" rx="6" fill="#1e3a8a" opacity="0.8"/>
      <text x="80" y="30" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#fff">Multi-Head</text>
      <text x="80" y="48" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#fff">Self-Attention</text>
      <text x="80" y="68" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#93c5fd">GQA + RoPE</text>
    </g>

    <path d="M190 80 L230 80" stroke="#fff" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>
    <defs><marker id="arrowW" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#fff"/></marker></defs>

    <!-- FFN -->
    <g transform="translate(240, 40)">
      <rect width="160" height="80" rx="6" fill="#1e3a8a" opacity="0.8"/>
      <text x="80" y="30" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#fff">Feed-Forward</text>
      <text x="80" y="48" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#fff">Network</text>
      <text x="80" y="68" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#93c5fd">SwiGLU</text>
    </g>

    <path d="M400 80 L440 80" stroke="#fff" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

    <!-- Norm -->
    <g transform="translate(450, 40)">
      <rect width="160" height="80" rx="6" fill="#1e3a8a" opacity="0.8"/>
      <text x="80" y="30" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#fff">Layer Norm</text>
      <text x="80" y="48" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#fff">+ Residual</text>
      <text x="80" y="68" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#93c5fd">4-32 Layers</text>
    </g>
  </g>

  <!-- Output Heads -->
  <g transform="translate(80, 320)">
    <rect width="640" height="70" rx="10" fill="url(#orange)" opacity="0.95"/>
    <text x="320" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#fff">Output Heads</text>

    <g transform="translate(20, 30)">
      <rect width="130" height="30" rx="4" fill="#c2410c"/>
      <text x="65" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Language Head</text>
    </g>
    <g transform="translate(170, 30)">
      <rect width="130" height="30" rx="4" fill="#c2410c"/>
      <text x="65" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Meta-Cognition</text>
    </g>
    <g transform="translate(320, 30)">
      <rect width="130" height="30" rx="4" fill="#c2410c"/>
      <text x="65" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Confidence</text>
    </g>
    <g transform="translate(470, 30)">
      <rect width="150" height="30" rx="4" fill="#c2410c"/>
      <text x="75" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Online Learning</text>
    </g>
  </g>

  <!-- Extended Modules -->
  <text x="400" y="420" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#888">Extended Cognitive Modules</text>

  <g transform="translate(50, 440)">
    <rect width="160" height="45" rx="6" fill="url(#purple)" opacity="0.85"/>
    <text x="80" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Program Synthesis</text>
    <text x="80" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#c4b5fd">DSL + Neural</text>
  </g>
  <g transform="translate(230, 440)">
    <rect width="160" height="45" rx="6" fill="url(#purple)" opacity="0.85"/>
    <text x="80" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Scene Graphs</text>
    <text x="80" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#c4b5fd">Slot Attention</text>
  </g>
  <g transform="translate(410, 440)">
    <rect width="160" height="45" rx="6" fill="url(#purple)" opacity="0.85"/>
    <text x="80" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Intrinsic Motivation</text>
    <text x="80" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#c4b5fd">Curiosity-Driven</text>
  </g>
  <g transform="translate(590, 440)">
    <rect width="160" height="45" rx="6" fill="url(#purple)" opacity="0.85"/>
    <text x="80" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Continuous Learning</text>
    <text x="80" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#c4b5fd">Experience Replay</text>
  </g>

  <g transform="translate(50, 500)">
    <rect width="160" height="45" rx="6" fill="url(#purple)" opacity="0.85"/>
    <text x="80" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Grounded Language</text>
    <text x="80" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#c4b5fd">Vision-Language</text>
  </g>
  <g transform="translate(230, 500)">
    <rect width="160" height="45" rx="6" fill="url(#purple)" opacity="0.85"/>
    <text x="80" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Knowledge Graph</text>
    <text x="80" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#c4b5fd">Entity-Relation</text>
  </g>
  <g transform="translate(410, 500)">
    <rect width="160" height="45" rx="6" fill="url(#purple)" opacity="0.85"/>
    <text x="80" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Abstract Reasoning</text>
    <text x="80" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#c4b5fd">Relational + Causal</text>
  </g>
  <g transform="translate(590, 500)">
    <rect width="160" height="45" rx="6" fill="url(#purple)" opacity="0.85"/>
    <text x="80" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#fff">Tool Use</text>
    <text x="80" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#c4b5fd">Code Execution</text>
  </g>

  <!-- Footer -->
  <text x="400" y="575" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#666">vAGI - Research-Focused AGI | PyTorch</text>
</svg>
