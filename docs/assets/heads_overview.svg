<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <style>
      .box { fill: #f5f5f5; stroke: #222; stroke-width: 1.5; }
      .label { font-family: Arial, sans-serif; font-size: 14px; fill: #111; }
      .small { font-family: Arial, sans-serif; font-size: 12px; fill: #111; }
      .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333"/>
    </marker>
  </defs>

  <rect class="box" x="40" y="80" width="160" height="60" rx="6"/>
  <text class="label" x="120" y="110" text-anchor="middle">hidden states</text>

  <rect class="box" x="280" y="30" width="160" height="50" rx="6"/>
  <text class="label" x="360" y="60" text-anchor="middle">LanguageHead</text>
  <rect class="box" x="280" y="90" width="160" height="50" rx="6"/>
  <text class="label" x="360" y="120" text-anchor="middle">PolicyHead</text>
  <rect class="box" x="280" y="150" width="160" height="50" rx="6"/>
  <text class="label" x="360" y="180" text-anchor="middle">ValueHead</text>

  <rect class="box" x="520" y="60" width="160" height="50" rx="6"/>
  <text class="small" x="600" y="90" text-anchor="middle">text_logits</text>
  <rect class="box" x="520" y="120" width="160" height="50" rx="6"/>
  <text class="small" x="600" y="150" text-anchor="middle">action_logits</text>
  <rect class="box" x="520" y="180" width="160" height="30" rx="6"/>
  <text class="small" x="600" y="200" text-anchor="middle">value</text>

  <rect class="box" x="720" y="120" width="160" height="50" rx="6"/>
  <text class="label" x="800" y="150" text-anchor="middle">WorldHead</text>
  <rect class="box" x="720" y="60" width="160" height="50" rx="6"/>
  <text class="small" x="800" y="90" text-anchor="middle">world_pred</text>

  <line class="arrow" x1="200" y1="110" x2="280" y2="55"/>
  <line class="arrow" x1="200" y1="110" x2="280" y2="115"/>
  <line class="arrow" x1="200" y1="110" x2="280" y2="175"/>

  <line class="arrow" x1="440" y1="55" x2="520" y2="85"/>
  <line class="arrow" x1="440" y1="115" x2="520" y2="145"/>
  <line class="arrow" x1="440" y1="175" x2="520" y2="195"/>

  <line class="arrow" x1="440" y1="115" x2="720" y2="145"/>
  <line class="arrow" x1="720" y1="145" x2="720" y2="85"/>
</svg>
