<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; font-weight: 600; }
      .label { font-family: Arial, sans-serif; font-size: 13px; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 11px; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
      .group { fill: #e2e8f0; stroke: #334155; stroke-width: 1.2; rx: 10; }
      .arrow { stroke: #334155; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 4; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>

  <text class="title" x="30" y="28">Output Heads Overview</text>

  <rect class="box" x="40" y="110" width="170" height="60"/>
  <text class="label" x="125" y="142" text-anchor="middle">hidden states</text>

  <rect class="group" x="260" y="60" width="300" height="180"/>
  <text class="label" x="410" y="86" text-anchor="middle">Core Heads</text>

  <rect class="box" x="280" y="100" width="120" height="40"/>
  <text class="small" x="340" y="125" text-anchor="middle">LanguageHead</text>

  <rect class="box" x="420" y="100" width="120" height="40"/>
  <text class="small" x="480" y="125" text-anchor="middle">PolicyHead</text>

  <rect class="box" x="280" y="150" width="120" height="40"/>
  <text class="small" x="340" y="175" text-anchor="middle">ValueHead</text>

  <rect class="box" x="420" y="150" width="120" height="40"/>
  <text class="small" x="480" y="175" text-anchor="middle">WorldHead</text>

  <rect class="group" x="600" y="60" width="260" height="180"/>
  <text class="label" x="730" y="86" text-anchor="middle">Optional Heads</text>

  <rect class="box" x="620" y="100" width="100" height="40"/>
  <text class="small" x="670" y="125" text-anchor="middle">ActionValid</text>

  <rect class="box" x="740" y="100" width="100" height="40"/>
  <text class="small" x="790" y="125" text-anchor="middle">LogVar</text>

  <rect class="box" x="620" y="150" width="100" height="40"/>
  <text class="small" x="670" y="175" text-anchor="middle">ErrorType</text>

  <rect class="box" x="740" y="150" width="100" height="40"/>
  <text class="small" x="790" y="175" text-anchor="middle">Budget</text>

  <rect class="group" x="900" y="60" width="260" height="180"/>
  <text class="label" x="1030" y="86" text-anchor="middle">Outputs</text>

  <rect class="box" x="920" y="100" width="220" height="40"/>
  <text class="small" x="1030" y="125" text-anchor="middle">text_logits / action_logits</text>

  <rect class="box" x="920" y="150" width="220" height="40"/>
  <text class="small" x="1030" y="175" text-anchor="middle">value / world_pred</text>

  <rect class="box" x="920" y="200" width="220" height="40"/>
  <text class="small" x="1030" y="225" text-anchor="middle">uncertainty / budget / info</text>

  <!-- Arrows -->
  <line class="arrow" x1="210" y1="140" x2="260" y2="140"/>
  <line class="arrow" x1="560" y1="120" x2="600" y2="120"/>
  <line class="arrow" x1="560" y1="170" x2="600" y2="170"/>
  <line class="arrow" x1="860" y1="120" x2="900" y2="120"/>
  <line class="arrow" x1="860" y1="170" x2="900" y2="170"/>
  <line class="arrow dash" x1="860" y1="190" x2="900" y2="220"/>
</svg>
