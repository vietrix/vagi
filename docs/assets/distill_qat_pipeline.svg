<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; font-weight: 600; }
      .label { font-family: Arial, sans-serif; font-size: 13px; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 11px; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
      .group { fill: #e2e8f0; stroke: #334155; stroke-width: 1.2; rx: 10; }
      .arrow { stroke: #334155; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 4; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>

  <text class="title" x="30" y="28">Distillation + QAT Pipeline</text>

  <rect class="box" x="40" y="90" width="140" height="50"/>
  <text class="label" x="110" y="120" text-anchor="middle">dataset</text>

  <rect class="box" x="210" y="60" width="160" height="90"/>
  <text class="label" x="290" y="95" text-anchor="middle">Teacher</text>
  <text class="small" x="290" y="115" text-anchor="middle">full-size model</text>

  <rect class="group" x="400" y="40" width="320" height="130"/>
  <text class="label" x="560" y="65" text-anchor="middle">Distill losses</text>
  <text class="small" x="560" y="90" text-anchor="middle">KL(logits), MSE(value/world)</text>
  <text class="small" x="560" y="110" text-anchor="middle">uncertainty + trace matching</text>
  <text class="small" x="560" y="130" text-anchor="middle">(optional supervised loss)</text>

  <rect class="box" x="760" y="60" width="160" height="90"/>
  <text class="label" x="840" y="95" text-anchor="middle">Student</text>
  <text class="small" x="840" y="115" text-anchor="middle">smaller model</text>

  <rect class="group" x="950" y="60" width="200" height="90"/>
  <text class="label" x="1050" y="95" text-anchor="middle">QAT phase</text>
  <text class="small" x="1050" y="115" text-anchor="middle">int8 / bf16 drift</text>

  <rect class="box" x="950" y="170" width="200" height="50"/>
  <text class="label" x="1050" y="200" text-anchor="middle">deploy (vAGI-lite)</text>

  <!-- Arrows -->
  <line class="arrow" x1="180" y1="115" x2="210" y2="105"/>
  <line class="arrow" x1="370" y1="105" x2="400" y2="105"/>
  <line class="arrow" x1="720" y1="105" x2="760" y2="105"/>
  <line class="arrow" x1="920" y1="105" x2="950" y2="105"/>
  <line class="arrow dash" x1="1050" y1="150" x2="1050" y2="170"/>
</svg>
