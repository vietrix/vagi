<svg xmlns="http://www.w3.org/2000/svg" width="980" height="340" viewBox="0 0 980 340">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <rect x="20" y="30" width="160" height="50" fill="#f1f5f9" stroke="#334155" />
  <text x="100" y="60" font-family="Arial" font-size="14" text-anchor="middle">Dataset</text>

  <rect x="210" y="30" width="180" height="50" fill="#e2e8f0" stroke="#334155" />
  <text x="300" y="60" font-family="Arial" font-size="12" text-anchor="middle">Teacher (full)</text>

  <rect x="420" y="20" width="220" height="70" fill="#fef9c3" stroke="#92400e" />
  <text x="530" y="48" font-family="Arial" font-size="12" text-anchor="middle">Distill losses</text>
  <text x="530" y="66" font-family="Arial" font-size="11" text-anchor="middle">logits/value/world/uncertainty/trace</text>

  <rect x="670" y="30" width="160" height="50" fill="#e0f2fe" stroke="#0369a1" />
  <text x="750" y="60" font-family="Arial" font-size="12" text-anchor="middle">Student (small)</text>

  <rect x="840" y="30" width="120" height="50" fill="#f1f5f9" stroke="#334155" />
  <text x="900" y="60" font-family="Arial" font-size="12" text-anchor="middle">QAT</text>

  <rect x="840" y="100" width="120" height="50" fill="#dcfce7" stroke="#166534" />
  <text x="900" y="130" font-family="Arial" font-size="12" text-anchor="middle">Deploy</text>

  <line x1="180" y1="55" x2="210" y2="55" stroke="#334155" marker-end="url(#arrow)" />
  <line x1="390" y1="55" x2="420" y2="55" stroke="#334155" marker-end="url(#arrow)" />
  <line x1="640" y1="55" x2="670" y2="55" stroke="#334155" marker-end="url(#arrow)" />
  <line x1="830" y1="55" x2="840" y2="55" stroke="#334155" marker-end="url(#arrow)" />
  <line x1="900" y1="80" x2="900" y2="100" stroke="#334155" marker-end="url(#arrow)" />

  <rect x="40" y="190" width="200" height="60" fill="#f8fafc" stroke="#334155" />
  <text x="140" y="218" font-family="Arial" font-size="12" text-anchor="middle">Metrics</text>
  <text x="140" y="236" font-family="Arial" font-size="12" text-anchor="middle">loss + parity</text>

  <rect x="270" y="190" width="200" height="60" fill="#f8fafc" stroke="#334155" />
  <text x="370" y="218" font-family="Arial" font-size="12" text-anchor="middle">Sweep</text>
  <text x="370" y="236" font-family="Arial" font-size="12" text-anchor="middle">params vs latency</text>

  <rect x="500" y="190" width="200" height="60" fill="#f8fafc" stroke="#334155" />
  <text x="600" y="218" font-family="Arial" font-size="12" text-anchor="middle">Pareto</text>
  <text x="600" y="236" font-family="Arial" font-size="12" text-anchor="middle">select vAGI-lite</text>

  <line x1="240" y1="220" x2="270" y2="220" stroke="#334155" marker-end="url(#arrow)" />
  <line x1="470" y1="220" x2="500" y2="220" stroke="#334155" marker-end="url(#arrow)" />
  <line x1="600" y1="190" x2="900" y2="150" stroke="#94a3b8" marker-end="url(#arrow)" />
