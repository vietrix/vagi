<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <style>
      .box { fill: #f5f5f5; stroke: #222; stroke-width: 1.5; }
      .label { font-family: Arial, sans-serif; font-size: 14px; fill: #111; }
      .small { font-family: Arial, sans-serif; font-size: 12px; fill: #111; }
      .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 4; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333"/>
    </marker>
  </defs>

  <rect class="box" x="40" y="60" width="160" height="60" rx="6"/>
  <text class="label" x="120" y="95" text-anchor="middle">Teacher</text>

  <rect class="box" x="260" y="30" width="220" height="120" rx="6"/>
  <text class="label" x="370" y="60" text-anchor="middle">Distill losses</text>
  <text class="small" x="370" y="85" text-anchor="middle">logits / value / world</text>
  <text class="small" x="370" y="105" text-anchor="middle">uncertainty / trace</text>

  <rect class="box" x="540" y="60" width="160" height="60" rx="6"/>
  <text class="label" x="620" y="95" text-anchor="middle">Student</text>

  <rect class="box" x="740" y="60" width="140" height="60" rx="6"/>
  <text class="label" x="810" y="88" text-anchor="middle">QAT</text>
  <text class="small" x="810" y="108" text-anchor="middle">int8 / bf16</text>

  <line class="arrow" x1="200" y1="90" x2="260" y2="90"/>
  <line class="arrow" x1="480" y1="90" x2="540" y2="90"/>
  <line class="arrow dash" x1="700" y1="90" x2="740" y2="90"/>
</svg>
